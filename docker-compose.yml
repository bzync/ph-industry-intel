services:
  docs:
    container_name: 'ph-industry-intel-docs'
    build:
      context: .
      dockerfile: docs/Dockerfile
    ports:
      - "8092:80"
    restart: unless-stopped
    networks:
      - ph-industry-intel-network
      - proxy-network

networks:
  ph-industry-intel-network:
  proxy-network:
    external: true
